name: Bug Report
description: Report unexpected behavior or a crash
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible
        so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The exact command(s) you ran.
      placeholder: |
        dbara -m backup -a jellyfin -d /srv/apps -b /srv/backups -v
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Full output
      description: Paste the complete output. Run with `-vv` for maximum detail.
      render: text
    validations:
      required: true

  - type: input
    id: dbara_version
    attributes:
      label: DBaRA version
      placeholder: "e.g. 20260503  (run: dbara --version)"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.3  (run: python3 --version)"
    validations:
      required: true

  - type: input
    id: docker_version
    attributes:
      label: Docker version
      placeholder: "e.g. 27.0.3  (run: docker --version)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Ubuntu 24.04"
    validations:
      required: true
